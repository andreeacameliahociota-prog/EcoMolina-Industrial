<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molina Smart City - Interactiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 24px; }
        .sidebar { background-color: #064e3b; }
        .seccion { display: none; }
        .seccion.activa { display: block; }
        /* Animación para el mensaje de éxito */
        #mensajeExito { display: none; }
        .animar-entrada { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 flex h-screen font-sans overflow-hidden">

    <aside class="w-80 sidebar text-white flex flex-col p-8 shadow-2xl">
        <div class="mb-12 flex flex-col items-center">
            <div class="bg-emerald-400 p-4 rounded-3xl mb-4">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#064e3b" stroke-width="2.5"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-7 7c-1.18 0-2.34-.31-3.35-.86L11 20z"></path></svg>
            </div>
            <h1 class="text-2xl font-black text-center">MOLINA <span class="text-emerald-400 block text-xs tracking-widest uppercase">Smart City</span></h1>
        </div>
        <nav class="flex-1 space-y-3">
            <button onclick="cambiarSeccion('mapa')" class="w-full text-left flex items-center space-x-4 p-4 hover:bg-emerald-800 rounded-2xl transition font-bold"><span>📍</span> <span>Mapa de Ciudad</span></button>
            <button onclick="cambiarSeccion('avisos')" class="w-full text-left flex items-center space-x-4 p-4 hover:bg-emerald-800 rounded-2xl transition font-bold"><span>📢</span> <span>Aviso Ciudadano</span></button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-12 relative">
        
        <div id="mensajeExito" class="absolute top-10 left-1/2 -translate-x-1/2 z-[1000] bg-emerald-600 text-white px-8 py-4 rounded-full shadow-2xl font-bold animar-entrada">
            ✅ ¡Reporte enviado con éxito al Ayuntamiento de Molina!
        </div>

        <section id="mapa" class="seccion activa">
            <h2 class="text-4xl font-black text-slate-800 mb-8">Red de Contenedores</h2>
            <div class="bg-white p-4 rounded-[2.5rem] shadow-2xl border border-slate-100"><div id="map"></div></div>
        </section>

        <section id="avisos" class="seccion">
            <h2 class="text-4xl font-black text-slate-800 mb-6 uppercase">Reportar Incidencia</h2>
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 max-w-2xl">
                <p class="text-lg text-slate-500 mb-8 font-medium italic">Selecciona el problema y escribe la ubicación para probar el sistema.</p>
                <form id="formularioAviso" class="space-y-6" onsubmit="event.preventDefault(); procesarReporte();">
                    <div class="grid grid-cols-2 gap-4">
                        <button type="button" onclick="this.style.borderColor='#10b981'" class="p-6 bg-slate-50 rounded-3xl border-2 border-transparent hover:border-emerald-500 transition-all text-center">
                            <span class="text-4xl block mb-2">🗑️</span><span class="text-xs font-black uppercase text-slate-600">Lleno</span>
                        </button>
                        <button type="button" onclick="this.style.borderColor='#ef4444'" class="p-6 bg-slate-50 rounded-3xl border-2 border-transparent hover:border-red-500 transition-all text-center">
                            <span class="text-4xl block mb-2">💨</span><span class="text-xs font-black uppercase text-slate-600">Mal Olor</span>
                        </button>
                    </div>
                    <input type="text" id="inputCalle" required placeholder="Escribe tu calle..." class="w-full p-6 bg-slate-50 rounded-2xl border-2 border-slate-100 focus:border-emerald-500 focus:outline-none text-lg">
                    <button type="submit" class="w-full bg-emerald-600 text-white font-black py-6 rounded-2xl shadow-xl hover:bg-emerald-700 transition-all text-xl uppercase tracking-widest">Enviar Reporte</button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function cambiarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'mapa') setTimeout(() => { map.invalidateSize() }, 200);
        }

        // Simular el envío
        function procesarReporte() {
            const calle = document.getElementById('inputCalle').value;
            const mensaje = document.getElementById('mensajeExito');
            
            if(calle) {
                mensaje.style.display = 'block';
                document.getElementById('formularioAviso').reset(); // Limpia el formulario
                
                // Ocultar el mensaje después de 4 segundos
                setTimeout(() => { mensaje.style.display = 'none'; }, 4000);
            }
        }

        var map = L.map('map').setView([38.0535, -1.2135], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.circleMarker([38.0540, -1.2140], { color: '#10b981', fillColor: '#10b981', fillOpacity: 0.8, radius: 10 }).addTo(map).bindPopup("Plaza de España");
        L.circleMarker([38.0525, -1.2120], { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.8, radius: 10 }).addTo(map).bindPopup("Calle Mayor - LLENO");
    </script>
</body>
</html>
